<!DOCTYPE html>
<html>
<head>
<title>Login & Register</title>
<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;
background:linear-gradient(to right,#667eea,#764ba2);font-family:Arial}
.card{background:white;padding:30px;border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);width:300px}
input{width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc}
input:focus{outline:none;border-color:#667eea}
button{width:100%;padding:10px;background:#667eea;color:white;border:none;
border-radius:5px;cursor:pointer}
button:hover{background:#5563c1}
</style>
</head>
<body>

<div class="card">
<h2>Login</h2>
<label>Email</label>
<input type="email">
<label>Password</label>
<input type="password">
<button>Login</button>
</div>

</body>
</html>
